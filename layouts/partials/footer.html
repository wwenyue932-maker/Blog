<footer
  class="mx-auto flex h-[4.5rem] max-w-(--w) items-center px-8 text-xs tracking-wider uppercase opacity-60"
>
  <div class="mr-auto">
    {{- if site.Copyright -}} {{- site.Copyright -}} {{- else -}} &copy; {{-
    now.Year }}
    <a class="link" href="{{- `` | relURL -}}">{{- site.Title -}}</a>
    {{- end -}}
  </div>
  <a class="link mx-6" href="https://gohugo.io/" rel="noopener" target="_blank"
    >powered by hugo️️</a
  >️
  <a
    class="link"
    href="https://github.com/nanxiaobei/hugo-paper"
    rel="noopener"
    target="_blank"
    >hugo-paper</a
  >
</footer>

{{- $avatar_url := $.Scratch.Get "avatar_url" -}}
{{- if $avatar_url -}}
<div id="paper-mascot">
  <div class="bubble" aria-live="polite"></div>
  <button type="button" aria-label="Mascot">
    <img src="{{- $avatar_url -}}" alt="" />
  </button>
</div>
<script>
  (function () {
    const root = document.getElementById('paper-mascot');
    if (!root) return;
    const bubble = root.querySelector('.bubble');
    const btn = root.querySelector('button');
    const lines = [
      '专注一件事，慢慢变强。',
      '今天也写一行代码。',
      '别急，先把问题拆小。',
      '记录，会让你走得更远。',
      '少即是多。',
    ];
    let hideTimer;
    const show = (text) => {
      if (bubble) bubble.textContent = text;
      root.classList.add('show');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        root.classList.remove('show');
      }, 2600);
    };
    btn.addEventListener('click', () => {
      show(lines[Math.floor(Math.random() * lines.length)]);
    });
  })();
</script>
{{- end -}}
